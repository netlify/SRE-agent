# Commit this file to argocd-root at:
#   applications/aws/staging/sre-agent/sre-agent-staging.yaml
#
# Before committing, fill in the two placeholders from Terraform outputs:
#   POD_IAM_ROLE_ARN       — terraform output: pod_iam_role_arn
#   POD_SECURITY_GROUP_ID  — terraform output: pod_security_group_id
#
# DATABASE_URL stored in Vault must be:
#   postgresql://sre_agent:<password>@<rds_cluster_writer_endpoint>:5432/sre_agent?sslmode=require
# Retrieve the master password from AWS Secrets Manager using:
#   terraform output rds_credentials_secret_id
---
apiVersion: v1
kind: Namespace
metadata:
  labels:
    elbv2.k8s.aws/pod-readiness-gate-inject: enabled
    environment: staging
  name: sre-agent-staging
---
apiVersion: v1
kind: ServiceAccount
metadata:
  annotations:
    eks.amazonaws.com/role-arn: POD_IAM_ROLE_ARN
  name: sre-agent-default
  namespace: sre-agent-staging
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: sre-agent-vault-auth
  namespace: sre-agent-staging
---
apiVersion: external-secrets.io/v1
kind: SecretStore
metadata:
  name: sre-agent-vault-store
  namespace: sre-agent-staging
spec:
  provider:
    vault:
      auth:
        kubernetes:
          mountPath: services-cmh-stag-1
          role: sre-agent-staging
          serviceAccountRef:
            name: sre-agent-vault-auth
      path: secret
      server: https://vault-releng.infra-prod.nsvcs.net/
      version: v2
---
# All secrets stored in Vault at secret/data/sre-agent/staging with keys:
#   slack-bot-token, slack-signing-secret, anthropic-api-key,
#   database-url, github-token, sre-team-slack-id,
#   blueprints-repo-url, knowledge-repo-url
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: sre-agent-secrets
  namespace: sre-agent-staging
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: SecretStore
    name: sre-agent-vault-store
  target:
    name: sre-agent-secrets
  dataFrom:
  - extract:
      key: secret/data/sre-agent/staging
---
apiVersion: vpcresources.k8s.aws/v1beta1
kind: SecurityGroupPolicy
metadata:
  labels:
    environment: staging
  name: sre-agent
  namespace: sre-agent-staging
spec:
  podSelector: {}
  securityGroups:
    groupIds:
    - POD_SECURITY_GROUP_ID
---
apiVersion: apps/v1
kind: Deployment
metadata:
  annotations:
    git_branch: main
    git_commit: DEPLOY_SHA
  labels:
    app: sre-agent
    environment: staging
    reloader.stakater.com/auto: "true"
    role: sre-agent
    tags.datadoghq.com/env: staging
    tags.datadoghq.com/service: sre-agent
    tags.datadoghq.com/version: DEPLOY_SHA
  name: sre-agent
  namespace: sre-agent-staging
spec:
  minReadySeconds: 5
  progressDeadlineSeconds: 600
  replicas: 1
  revisionHistoryLimit: 3
  selector:
    matchLabels:
      app: sre-agent
      environment: staging
      role: sre-agent
  strategy:
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
    type: RollingUpdate
  template:
    metadata:
      annotations:
        git_branch: main
        git_commit: DEPLOY_SHA
      labels:
        app: sre-agent
        environment: staging
        role: sre-agent
        tags.datadoghq.com/env: staging
        tags.datadoghq.com/service: sre-agent
        tags.datadoghq.com/version: DEPLOY_SHA
    spec:
      serviceAccountName: sre-agent-default
      dnsConfig:
        options:
        - name: ndots
          value: "2"
      nodeSelector:
        netlify/env: staging
      terminationGracePeriodSeconds: 30
      initContainers:
      - name: clone-repos
        image: alpine/git:latest
        command:
        - sh
        - -c
        - |
          git clone --depth 1 $BLUEPRINTS_REPO_URL /data/blueprints || true
          git clone --depth 1 $KNOWLEDGE_REPO_URL /data/sre-agent-knowledge || true
        env:
        - name: BLUEPRINTS_REPO_URL
          valueFrom:
            secretKeyRef:
              name: sre-agent-secrets
              key: blueprints-repo-url
        - name: KNOWLEDGE_REPO_URL
          valueFrom:
            secretKeyRef:
              name: sre-agent-secrets
              key: knowledge-repo-url
        volumeMounts:
        - name: blueprints
          mountPath: /data/blueprints
        - name: knowledge
          mountPath: /data/sre-agent-knowledge
      containers:
      - name: sre-agent
        image: AWS_ACCOUNT_ID.dkr.ecr.us-east-2.amazonaws.com/sre-agent:DEPLOY_SHA
        imagePullPolicy: Always
        ports:
        - containerPort: 3000
          name: http
        env:
        - name: NODE_ENV
          value: staging
        - name: LOG_LEVEL
          value: info
        - name: BLUEPRINTS_LOCAL_PATH
          value: /data/blueprints
        - name: KNOWLEDGE_LOCAL_PATH
          value: /data/sre-agent-knowledge
        - name: GITHUB_ORG
          value: netlify
        - name: CLAUDE_MODEL
          value: claude-opus-4-6
        - name: DD_ENV
          valueFrom:
            fieldRef:
              fieldPath: metadata.labels['tags.datadoghq.com/env']
        - name: DD_SERVICE
          valueFrom:
            fieldRef:
              fieldPath: metadata.labels['tags.datadoghq.com/service']
        - name: DD_VERSION
          valueFrom:
            fieldRef:
              fieldPath: metadata.labels['tags.datadoghq.com/version']
        - name: SLACK_BOT_TOKEN
          valueFrom:
            secretKeyRef:
              name: sre-agent-secrets
              key: slack-bot-token
        - name: SLACK_SIGNING_SECRET
          valueFrom:
            secretKeyRef:
              name: sre-agent-secrets
              key: slack-signing-secret
        - name: ANTHROPIC_API_KEY
          valueFrom:
            secretKeyRef:
              name: sre-agent-secrets
              key: anthropic-api-key
        - name: DATABASE_URL
          valueFrom:
            secretKeyRef:
              name: sre-agent-secrets
              key: database-url
        - name: GITHUB_TOKEN
          valueFrom:
            secretKeyRef:
              name: sre-agent-secrets
              key: github-token
        - name: SRE_TEAM_SLACK_ID
          valueFrom:
            secretKeyRef:
              name: sre-agent-secrets
              key: sre-team-slack-id
        volumeMounts:
        - name: blueprints
          mountPath: /data/blueprints
        - name: knowledge
          mountPath: /data/sre-agent-knowledge
        resources:
          requests:
            cpu: 100m
            memory: 256Mi
          limits:
            cpu: 500m
            memory: 512Mi
        lifecycle:
          preStop:
            exec:
              command: ["/bin/sleep", "15"]
        readinessProbe:
          failureThreshold: 2
          httpGet:
            path: /health
            port: 3000
            scheme: HTTP
          initialDelaySeconds: 5
          periodSeconds: 5
          successThreshold: 2
          timeoutSeconds: 2
        livenessProbe:
          failureThreshold: 3
          httpGet:
            path: /health
            port: 3000
            scheme: HTTP
          initialDelaySeconds: 10
          periodSeconds: 30
      volumes:
      - name: blueprints
        emptyDir: {}
      - name: knowledge
        emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: sre-agent
  namespace: sre-agent-staging
spec:
  ports:
  - name: http
    port: 80
    protocol: TCP
    targetPort: 3000
  selector:
    app: sre-agent
    role: sre-agent
  type: ClusterIP
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: sre-agent
  namespace: sre-agent-staging
spec:
  maxUnavailable: 1
  selector:
    matchLabels:
      app: sre-agent
      environment: staging
      role: sre-agent
