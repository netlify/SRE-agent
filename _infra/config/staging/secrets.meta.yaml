# Non-secret metadata for the staging deployment.
# Safe to commit in plaintext.

environment: staging

# Public repo URLs used by the clone-repos init container.
blueprints-repo-url: "https://github.com/netlify/blueprints.git"
knowledge-repo-url: "https://github.com/netlify/sre-agent-knowledge.git"

# Optional: Slack group ID for @sre-team escalation detection.
# Defaults to empty string if not set — app starts fine without it.
# Find it via: curl -s "https://slack.com/api/usergroups.list" -H "Authorization: Bearer <bot-token>" | jq '.usergroups[] | select(.handle == "sre") | .id'
sre-team-slack-id: "REPLACE_ME"

# Encryption key reference (matches .sops.yaml)
sops_kms_key: "projects/netlify-services/locations/global/keyRings/nf-services-staging/cryptoKeys/sre-agent"
